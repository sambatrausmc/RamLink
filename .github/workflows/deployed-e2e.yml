name: Test deployed application

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Deployed RamLink URL
        required: true
        type: string

permissions:
  contents: read

jobs:
  browser-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_OFFICER_EMAIL: ${{ secrets.E2E_OFFICER_EMAIL }}
      E2E_OFFICER_PASSWORD: ${{ secrets.E2E_OFFICER_PASSWORD }}
      E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
      E2E_STUDENT_PASSWORD: ${{ secrets.E2E_STUDENT_PASSWORD }}
      PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: npm run test:e2e
